<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm | Premium Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --sakura-light: #ffebee;
        --sakura-primary: #f06292;
        --sakura-gradient: linear-gradient(135deg, #f48fb1 0%, #f06292 50%, #ec407a 100%);
        --sakura-soft: #fce4ec;
        --text-dark: #3e1e2f;
        --text-muted: #5c3f4f;
        --card-bg: rgba(255, 235, 238, 0.92);
        --shadow-soft: 0 12px 40px rgba(236, 64, 122, 0.25);
        --border-color: #ec407a;
    }

    body {
        background: linear-gradient(180deg, #ffebee 0%, #f8d7e3 100%);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: var(--text-dark);
        margin: 0;
    }

    .main-container {
        padding: 50px 25px;
    }

    .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-radius: 26px;
        border: 2px solid var(--border-color);  /* Border đậm hơn */
        box-shadow: var(--shadow-soft);
        padding: 45px;
    }

    .header-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 45px;
        flex-wrap: wrap;
        gap: 20px;
    }

    .page-title {
        font-weight: 800;
        background: var(--sakura-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2.8rem;
        margin: 0;
    }

    .product-img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 16px;
        box-shadow: 0 6px 18px rgba(236, 64, 122, 0.3);
        transition: all 0.4s ease;
        border: 1.5px solid #f48fb1;  /* Thêm border nhẹ cho ảnh */
    }

    .product-img:hover {
        transform: scale(1.12) rotate(3deg);
    }

    .btn-premium {
        background: var(--sakura-gradient);
        border: none;
        color: white;
        padding: 14px 28px;
        border-radius: 16px;
        font-weight: 700;
        transition: all 0.35s ease;
        box-shadow: 0 6px 20px rgba(236, 64, 122, 0.4);
    }

    .btn-premium:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 35px rgba(236, 64, 122, 0.55);
    }

    .table {
        border-collapse: separate;
        border-spacing: 0 18px;
    }

    .table thead th {
        border: none;
        color: #7a5a6a;
        text-transform: uppercase;
        font-size: 0.82rem;
        letter-spacing: 1.2px;
        font-weight: 600;
    }

    .table tbody tr {
        background: white;
        box-shadow: 0 6px 18px rgba(236, 64, 122, 0.18);
        border-radius: 18px;
        transition: all 0.35s ease;
        border: 1px solid #f48fb1;  /* Border row nhẹ */
    }

    .table tbody tr:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 35px rgba(236, 64, 122, 0.35);
    }

    .table tbody td {
        border-top: 12px solid var(--sakura-light);
        vertical-align: middle;
        padding: 22px 20px;
        color: var(--text-dark);
    }

    .table tbody td:first-child {
        border-top-left-radius: 18px;
        border-bottom-left-radius: 18px;
    }

    .table tbody td:last-child {
        border-top-right-radius: 18px;
        border-bottom-right-radius: 18px;
    }

    .badge-category {
        background: #fce4ec;
        color: #4a2535;
        padding: 9px 14px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        border: 1.5px solid #f06292;  /* Border badge đậm hơn */
    }

    .btn-sm {
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.3s;
        border: 1.5px solid #f48fb1;
    }

    .btn-sm:hover {
        transform: scale(1.15);
    }
</style>
</head>

<body>
    <main class="main-container py-5">
        <div class="container">
            <div class="glass-card">
                <header class="header-section mb-5">
                    <h1 class="page-title mb-0">Quản lý Sản Phẩm</h1>
                    <a th:href="@{/products/add}" class="btn btn-premium">
                        <i class="fas fa-plus me-2"></i> Thêm sản phẩm mới
                    </a>
                </header>

                <div th:if="${products.empty}" class="text-center py-5 my-5">
                    <i class="fas fa-box-open fa-5x text-muted mb-4"></i>
                    <h4 class="text-muted mb-3">Chưa có sản phẩm nào</h4>
                    <p class="text-muted">Hãy bắt đầu bằng cách thêm sản phẩm đầu tiên</p>
                    <a th:href="@{/products/add}" class="btn btn-premium mt-3">
                        <i class="fas fa-plus me-2"></i> Thêm sản phẩm
                    </a>
                </div>

                <div th:unless="${products.empty}">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">Sản phẩm</th>
                                    <th scope="col">Danh mục</th>
                                    <th scope="col">Giá</th>
                                    <th scope="col" class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${products}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="flex-shrink-0 me-3">
                                                <img th:if="${product.image}" th:src="@{'/images/' + ${product.image}}" 
                                                     class="product-img" alt="" loading="lazy">
                                                <div th:unless="${product.image}" class="product-img bg-light d-flex align-items-center justify-content-center">
                                                    <i class="fas fa-image text-muted fa-lg"></i>
                                                </div>
                                            </div>
                                            <div>
                                                <div class="fw-bold" th:text="${product.name}"></div>
                                                <div class="text-muted small">ID: <span th:text="${product.id}"></span></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span class="badge-category" th:text="${product.category?.name} ?: 'Chưa phân loại'"></span></td>
                                    <td>
                                       <div class="fw-bold text-primary"
     th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
</div>
                                    </td>
                                    <td class="text-end">
                                        <div class="btn-group" role="group">
                                            <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                                               class="btn btn-sm btn-light" title="Sửa" aria-label="Sửa sản phẩm">
                                                <i class="fas fa-edit text-primary"></i>
                                            </a>
                                            <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                                               class="btn btn-sm btn-light" title="Xóa" 
                                               onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')"
                                               aria-label="Xóa sản phẩm">
                                                <i class="fas fa-trash text-danger"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
